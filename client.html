<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebSocket client</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    background: #f5f5f5;
    color: #222;
    padding: 2rem;
  }

  h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }

  .row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }

  input[type="text"] {
    flex: 1;
    padding: 0.4rem 0.6rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 0.95rem;
  }

  button {
    padding: 0.4rem 0.9rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.95rem;
    background: #555;
    color: #fff;
  }

  button:disabled { opacity: 0.4; cursor: default; }
  button#connect  { background: #2a7; }
  button#send     { background: #27a; }
  button#disconnect { background: #c44; }

  hr { border: none; border-top: 1px solid #ddd; margin: 1rem 0; }

  #log {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    max-height: 60vh;
    overflow-y: auto;
  }

  #log li {
    font-size: 0.88rem;
    padding: 0.25rem 0.5rem;
    border-radius: 3px;
    background: #fff;
    border: 1px solid #e0e0e0;
  }

  #log li.sent    { border-left: 3px solid #27a; }
  #log li.recv    { border-left: 3px solid #2a7; }
  #log li.status  { border-left: 3px solid #fa0; color: #555; }
  #log li.error   { border-left: 3px solid #c44; color: #c44; }
</style>
</head>
<body>
<h1>WebSocket client</h1>

<div class="row">
  <input type="text" id="wsUrl" value="ws://localhost:8088/echo">
  <button id="connect">Connect</button>
  <button id="disconnect" disabled>Disconnect</button>
</div>

<div class="row">
  <input type="text" id="message" placeholder="message" disabled>
  <button id="send" disabled>Send</button>
</div>

<hr>
<ul id="log"></ul>

<script>
(function () {
  'use strict';

  let ws = null;

  const url        = document.getElementById('wsUrl');
  const btnConnect = document.getElementById('connect');
  const btnDisconn = document.getElementById('disconnect');
  const msgInput   = document.getElementById('message');
  const btnSend    = document.getElementById('send');
  const log        = document.getElementById('log');

  function appendLog(text, cls) {
    const li = document.createElement('li');
    li.className = cls;
    li.textContent = text;
    log.appendChild(li);
    log.scrollTop = log.scrollHeight;
  }

  function setConnected(connected) {
    url.disabled        = connected;
    btnConnect.disabled = connected;
    btnDisconn.disabled = !connected;
    msgInput.disabled   = !connected;
    btnSend.disabled    = !connected;
    if (connected) msgInput.focus();
  }

  btnConnect.addEventListener('click', function () {
    if (!('WebSocket' in window)) {
      appendLog('WebSocket not supported in this browser.', 'error');
      return;
    }

    try {
      ws = new WebSocket(url.value.trim());
    } catch (e) {
      appendLog('Invalid URL: ' + e.message, 'error');
      return;
    }

    ws.onopen = function () {
      appendLog('connected to ' + ws.url, 'status');
      setConnected(true);
    };

    ws.onmessage = function (event) {
      appendLog('received: ' + event.data, 'recv');
    };

    ws.onerror = function () {
      appendLog('websocket error', 'error');
    };

    ws.onclose = function (event) {
      appendLog('closed (code ' + event.code + ')', 'status');
      setConnected(false);
      ws = null;
    };
  });

  btnDisconn.addEventListener('click', function () {
    if (ws) ws.close();
  });

  btnSend.addEventListener('click', sendMessage);

  msgInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') sendMessage();
  });

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(text);
    appendLog('sent: ' + text, 'sent');
    msgInput.value = '';
  }
}());
</script>
</body>
</html>
